<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* Navbar */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#333;
    padding:15px 30px;
}

.logo{
    color:white;
    font-size:24px;
}

.nav-links{
    display:flex;
    gap:20px;
    list-style:none;
}

.nav-links a{
    color:white;
    text-decoration:none;
}

/* Main Content */
.container{
    display:flex;
    justify-content:space-around;
    align-items:flex-start;
    gap:30px;
    padding:30px;
    flex-wrap:wrap;
}

/* Image Section */
.gallery{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.gallery img{
    width:220px;
    height:150px;
    border-radius:10px;
}

/* Form */
.form-box{
    width:300px;
    padding:20px;
    border:1px solid #ccc;
    border-radius:10px;
}

.form-box h2{
    margin-bottom:15px;
}

.form-box input,
.form-box textarea{
    width:100%;
    padding:10px;
    margin-bottom:12px;
}

.form-box button{
    width:100%;
    padding:10px;
    background:blue;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
    <h1 class="logo">My Website</h1>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<!-- Content -->
<div class="container">

    <!-- Images -->
    <div class="gallery">
        <img src="https://picsum.photos/220/150?1" alt="">
        <img src="https://picsum.photos/220/150?2" alt="">
        <img src="https://picsum.photos/220/150?3" alt="">
    </div>

    <!-- Form -->
    <div class="form-box">
        <h2>Contact Form</h2>

        <form>
            <input type="text" placeholder="Enter Name">

            <input type="email" placeholder="Enter Email">

            <textarea rows="4"
            placeholder="Message"></textarea>

            <button type="submit">
                Submit
            </button>
        </form>
    </div>

</div>

</body>
</html>
