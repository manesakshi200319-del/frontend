<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
           
            width: 400px;
            height: 500px;
           
            margin: 100px auto;
            border-radius: 25px;
            box-shadow: 0px 0px 10px black;
            display:flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
           justify-content: space-evenly;
        }

        img {
            border-radius: 50%;
            margin-top:25px;
        }
        p {
       width:300px;
        }
    </style>
</head>

<body>
    <div class="card">
        <img src="s.jpg" width="200px" height="200px">
        <p>Shivaji I was an Indian ruler and a member of the Bhonsle dynasty. Shivaji inherited a fiefdom from his
            father who served as a retainer for the Sultanate of Bijapur, which later formed the genesis of the Maratha
            Kingdom. In 1674, he was formally crowned
            the Chhatrapati of his realm at Raigad Fort. </p>
    </div>
</body>

</html>
